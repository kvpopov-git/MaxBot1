name: build

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Syntax check
        run: node --check index.js

      - name: Bump build number in version.json
        run: |
          node -e "
            const fs = require('fs');
            const v = JSON.parse(fs.readFileSync('version.json','utf8'));
            v.build = (v.build || 0) + 1;
            fs.writeFileSync('version.json', JSON.stringify(v, null, 2) + '\n');
            console.log('version.json → build', v.build);
          "

      - name: Commit & push version.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "ci: bump build to $(node -p \"JSON.parse(require('fs').readFileSync('version.json','utf8')).build\")"
          git push
